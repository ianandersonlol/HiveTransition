# ====================================================================
# Protein-protein docking example (reduced sampling for quick testing)
# Based on the E2A-HPr NMR-restrained docking benchmark
# ====================================================================

run_dir = "run1-test"

mode = "local"
ncores = 16

molecules = [
    "/quobyte/jbsiegelgrp/software/haddock3/examples/docking-protein-protein/data/e2aP_1F3G.pdb",
    "/quobyte/jbsiegelgrp/software/haddock3/examples/docking-protein-protein/data/hpr_ensemble.pdb"
    ]

# ====================================================================
[topoaa]
autohis = false
[topoaa.mol1]
nhisd = 0
nhise = 1
hise_1 = 75
[topoaa.mol2]
nhisd = 1
hisd_1 = 76
nhise = 1
hise_1 = 15

[rigidbody]
tolerance = 20
ambig_fname = "/quobyte/jbsiegelgrp/software/haddock3/examples/docking-protein-protein/data/e2a-hpr_air.tbl"
sampling = 20

[caprieval]
reference_fname = "/quobyte/jbsiegelgrp/software/haddock3/examples/docking-protein-protein/data/e2a-hpr_1GGR.pdb"

[seletop]
select = 5

[flexref]
tolerance = 20
ambig_fname = "/quobyte/jbsiegelgrp/software/haddock3/examples/docking-protein-protein/data/e2a-hpr_air.tbl"

[caprieval]
reference_fname = "/quobyte/jbsiegelgrp/software/haddock3/examples/docking-protein-protein/data/e2a-hpr_1GGR.pdb"

[emref]
tolerance = 20
ambig_fname = "/quobyte/jbsiegelgrp/software/haddock3/examples/docking-protein-protein/data/e2a-hpr_air.tbl"

[clustfcc]
min_population = 1

[seletopclusts]
top_models = 4

[caprieval]
reference_fname = "/quobyte/jbsiegelgrp/software/haddock3/examples/docking-protein-protein/data/e2a-hpr_1GGR.pdb"

# ====================================================================
